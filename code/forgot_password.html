<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your password for the Campus Placement Management System">
    <title>Forgot Password | Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        .step-section {
            display: none;
        }

        .step-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .otp-input {
            width: 48px;
            height: 56px;
            font-size: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            font-weight: 600;
            color: var(--text-main);
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--focus-ring);
            background-color: #ffffff;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            padding: 0;
            font-weight: 500;
        }

        .back-btn:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <!-- Left Branding side -->
        <div class="login-info-section">
            <div class="brand-logo">
                <img src="logo.png" alt="Placement Logo" style="width: 40px; height: 40px; border-radius: 4px;">
            </div>
            <h2>Secure Your Account</h2>
            <p>Create a strong and secure new password to protect your account.</p>

            <ul class="features-list">
                <li>Use at least 8 characters</li>
                <li>Include uppercase & lowercase letters</li>
                <li>Add numbers and special symbols</li>
            </ul>
        </div>

        <!-- Right Form side -->
        <div class="login-form-section">
            <button class="back-btn" onclick="window.location.href='login.html'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Login
            </button>

            <!-- STEP 1: Enter Details -->
            <div id="step-1" class="step-section active">
                <div class="login-header">
                    <h1>Forgot Password?</h1>
                    <p>Enter your details below to receive a verification code</p>
                </div>

                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="student" checked onchange="updateResetFields('student')">
                        <span class="role-btn">Student</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="recruiter" onchange="updateResetFields('recruiter')">
                        <span class="role-btn">Recruiter</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="admin" onchange="updateResetFields('admin')">
                        <span class="role-btn">Admin</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="contact-info" id="contact-label">Registered Email / Mobile Number</label>
                    <input type="text" id="contact-info" class="form-control"
                        placeholder="Enter your email or 10-digit mobile number" required>
                </div>

                <button class="btn-submit" onclick="goToStep(2)">Send Password Reset Link</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { auth } from './firebase_setup.js';
        import { sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';

        window.updateResetFields = function (role) {
            const label = document.getElementById('contact-label');
            const input = document.getElementById('contact-info');

            if (role === 'student') {
                label.textContent = 'University Email';
                input.placeholder = 'Enter your registered email';
            } else if (role === 'recruiter') {
                label.textContent = 'Work Email';
                input.placeholder = 'name@company.com';
            } else if (role === 'admin') {
                label.textContent = 'Staff Email';
                input.placeholder = 'staff@university.edu';
            }
        };

        window.goToStep = async function (step) {
            if (step === 2) {
                const submitBtn = document.querySelector('.btn-submit');
                const contactVal = document.getElementById('contact-info').value;
                if (!contactVal.trim()) {
                    alert('Please enter your email.');
                    return;
                }

                submitBtn.textContent = 'Sending...';
                submitBtn.disabled = true;

                try {
                    await sendPasswordResetEmail(auth, contactVal);
                    alert('Password reset link sent! Please check your email inbox to reset your password.');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error("Password Reset Error:", error);
                    alert("Failed to send reset email: " + error.message);
                    submitBtn.textContent = 'Send Verification Code';
                    submitBtn.disabled = false;
                }
            }
        };
    </script>
</body>

</html>
