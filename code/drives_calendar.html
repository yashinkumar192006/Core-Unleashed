<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <style>
        .calendar-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .month-year {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-name {
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-cell {
            min-height: 120px;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            padding: 8px;
            background: #fafafa;
            transition: all 0.2s ease;
        }

        .day-cell:hover {
            border-color: var(--primary);
            background: white;
        }

        .day-number {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: inline-block;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
        }

        .day-cell.today {
            background: #eff6ff;
            border-color: var(--primary);
        }

        .day-cell.today .day-number {
            background: var(--primary);
            color: white;
            border-radius: 6px;
        }

        .event-item {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .event-talk { background: #ecfdf5; color: #059669; border: 1px solid #bbf7d0; }
        .event-test { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .event-deadline { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

        .calendar-legend {
            display: flex;
            gap: 20px;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
    </style>
</head>

    <!-- Popup Code (sidebar popups) -->
    <div class="popup-panel" id="notifPopup"></div>
    <div class="popup-panel" id="quickPopup"></div>

    <script>
        // Persistence for Notifications
        let readNotifs = JSON.parse(localStorage.getItem('readNotifications') || '[]');

        function applyReadStatus() {
            const badge = document.getElementById('notifBadge');
            // In these pages we don't have the full list, but we can estimate the unread count from other pages
            // For a real app, this would come from a server. For this static prototype, 
            // we'll just check how many of our standard 2-4 notifications are NOT in the read list.
            const totalNotifs = 2; // Assuming 2 unread by default as in other pages
            const readCount = readNotifs.filter(id => id.startsWith('pop-notif-')).length;
            const unreadCount = Math.max(0, totalNotifs - readCount);
            
            if (badge) {
                badge.style.display = unreadCount === 0 ? 'none' : 'block';
                badge.textContent = unreadCount > 0 ? unreadCount : '';
            }
        }

        // Initialize
        applyReadStatus();

        function togglePopup(id, event) {
            event.stopPropagation();
            const panel = document.getElementById(id);
            const overlay = document.getElementById('popupOverlay');
            const isActive = panel.classList.contains('active');
            closeAllPopups();
            if (!isActive) { panel.classList.add('active'); overlay.classList.add('active'); }
        }
        function closeAllPopups() {
            document.querySelectorAll('.popup-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('popupOverlay').classList.remove('active');
        }
    </script>
